<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKVAULT — Add Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="add-product">


<div id="nav-slot"></div>
<div id="toast-slot"></div>
<div id="modal-slot"></div>

<div class="page active">
  <div class="breadcrumb">Home / <span>Add Product</span></div>
  <div class="page-header">
    <h1>Add Product</h1>
    <p>Upload a product photo and fill in the details below</p>
  </div>

  <div class="add-product-grid">
    <div>
      <div class="form-section">
        <h3>Product Photo</h3>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div id="uploadPlaceholder">
            <div class="icon">📦</div>
            <p>Click or drag to upload</p>
            <small>PNG, JPG, WEBP up to 10MB</small>
          </div>
          <img id="previewImg" style="display:none" alt="preview">
        </div>
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <div class="form-section">
        <h3>Preview</h3>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius2);padding:14px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div class="product-thumb" id="formThumb">📦</div>
            <div>
              <div id="previewName" style="font-weight:600;font-size:13px">Product Name</div>
              <div id="previewSku" style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">SKU-000</div>
            </div>
          </div>
          <div id="previewBadge"><span class="badge badge-green">In Stock</span></div>
          <div id="previewPrice" style="font-family:var(--font-display);font-size:20px;font-weight:700;margin-top:8px">₱0.00</div>
          <div id="previewDesc" style="font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5">Description will appear here...</div>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-header"><h3>Product Information</h3></div>
        <div class="card-body">
          <div class="form-section">
            <h3>Basic Info</h3>
            <div class="form-row">
              <div class="field">
                <label>Product Name *</label>
                <input type="text" id="f-name" placeholder="e.g. Wireless Headphones" oninput="updatePreview()">
              </div>
            </div>
            <div class="form-row cols-2">
              <div class="field">
                <label>Tag *</label>
                <input type="text" id="f-sku" placeholder="e.g. WH-001" oninput="updatePreview()">
              </div>
              <div class="field">
                <label>Category</label>
                <select id="f-category" onchange="updatePreview()">
                  <option value="">Select category</option>
                  <option>Electronics</option><option>Clothing</option>
                  <option>Food &amp; Beverages</option><option>Furniture</option>
                  <option>Tools &amp; Hardware</option><option>Health &amp; Beauty</option>
                  <option>Sports</option><option>Books</option>
                  <option>Toys</option><option>Other</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="field">
                <label>Description</label>
                <textarea id="f-desc" placeholder="Product description..." oninput="updatePreview()"></textarea>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>Pricing &amp; Stock</h3>
            <div class="form-row cols-3">
              <div class="field"><label>Price (₱) *</label><input type="number" id="f-price" placeholder="0.00" min="0" step="0.01" oninput="updatePreview()"></div>
              <div class="field"><label>Cost Price (₱)</label><input type="number" id="f-cost" placeholder="0.00" min="0" step="0.01"></div>
              <div class="field"><label>Quantity *</label><input type="number" id="f-qty" placeholder="0" min="0" oninput="updatePreview()"></div>
            </div>
            <div class="form-row cols-2">
              <div class="field"><label>Low Stock Threshold</label><input type="number" id="f-threshold" placeholder="5" min="0" value="5"></div>
              <div class="field"><label>Supplier / Brand</label><input type="text" id="f-supplier" placeholder="e.g. Acme Corp"></div>
            </div>
            <div class="form-row cols-2">
              <div class="field"><label>Location / Bin</label><input type="text" id="f-location" placeholder="e.g. Shelf A-3"></div>
              <div class="field"><label>Unit of Measure</label>
                <select id="f-uom">
                  <option>pcs</option><option>kg</option><option>g</option>
                  <option>L</option><option>mL</option><option>box</option>
                  <option>pack</option><option>pair</option><option>set</option>
                </select>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn primary" onclick="saveProduct()">💾 Save Product</button>
            <button class="btn ghost" onclick="clearForm()">Clear Form</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- scripts -->
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/toast.js"></script>
<script src="js/seed.js"></script>
<script src="js/add-product.js"></script>
<script src="js/init.js"></script>
</body>
</html>

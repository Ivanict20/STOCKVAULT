<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKVAULT — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="inventory">


<div id="nav-slot"></div>
<div id="toast-slot"></div>
<div id="modal-slot"></div>


<div class="page active">
  <div class="breadcrumb">Home / <span>View Inventory</span></div>
  <div class="page-header">
    <h1>View Inventory</h1>
    <p>Browse all products — click any row to expand details</p>
  </div>

  <div class="filter-bar">
    <input type="text" id="invSearch" placeholder="🔍  Search by name, SKU or category..." oninput="renderInventory()">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('in-stock',this)">In Stock</button>
    <button class="filter-btn" onclick="setFilter('medium',this)">Medium</button>
    <button class="filter-btn" onclick="setFilter('low',this)">Low Stock</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Product</th><th>Tag</th><th>Category</th><th>Price</th>
          <th>Cost</th><th>QTY</th><th>Location</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="inventoryBody"></tbody>
    </table>
  </div>
  <div id="inventoryEmpty"></div>

</div>

<!-- scripts -->
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/toast.js"></script>
<script src="js/seed.js"></script>
<script src="js/inventory.js"></script>
<script src="js/init.js"></script>
</body>
</html>

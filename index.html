<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKVAULT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="dashboard">


<div id="nav-slot"></div>
<div id="toast-slot"></div>
<div id="modal-slot"></div>

<div class="page active">
  <div class="breadcrumb">Home / <span>Dashboard</span></div>
  <div class="page-header">
    <h1>Dashboard</h1>
    <p>Welcome back — here's your inventory at a glance</p>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="dash-grid">
    <div class="card">
      <div class="card-header">
        <h3>Recent Products</h3>
        <button class="btn ghost" style="padding:6px 14px;font-size:12px" onclick="navigate('inventory')">View All</button>
      </div>
      <div class="card-body" id="recentProducts"></div>
    </div>

    <div>
      <div class="card">
        <div class="card-header"><h3>Quick Actions</h3></div>
        <div class="card-body">
          <button class="action-btn primary" onclick="navigate('add-product')">+ Add Product</button>
          <button class="action-btn secondary" onclick="navigate('update-stock')">Update Stock</button>
          <button class="action-btn secondary" onclick="navigate('inventory')">View All</button>
          <button class="action-btn secondary" onclick="navigate('inv-value')">Inventory Value</button>
        </div>
      </div>

      <div class="low-stock-widget" id="lowStockWidget">
        <div class="header">⚠ Low Stock Alerts</div>
        <div id="lowStockWidgetItems"></div>
      </div>
    </div>
  </div>

</div>

<!-- scripts -->
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/toast.js"></script>
<script src="js/seed.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/init.js"></script>
</body>
</html>
